<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat History - PrivacyShield</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="page-history">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-shield-halved"></i> PrivacyShield</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item"><i class="fa-solid fa-message"></i> Secure Chat</a>
                <a href="/dashboard" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="/history" class="nav-item active"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
            </nav>
            <div class="sidebar-footer">
                <button id="themeToggle" class="btn-theme-toggle">
                    <i class="fa-solid fa-moon"></i> <span>Dark Mode</span>
                </button>
            </div>
        </aside>
        <main class="main-content">
            <header class="chat-header">
                <h1>Conversation History</h1>
            </header>
            <section class="history-controls">
                <div class="history-unlock">
                    <label for="historyPwd">Unlock Sensitive Entries:</label>
                    <input type="password" id="historyPwd" placeholder="password" class="input-sm">
                    <button id="unlockBtn" class="btn-primary">Unlock</button>
                    <button id="clearAllBtn" class="btn-danger">Clear All History</button>
                    <button id="clearFilesBtn" class="btn-danger">Delete Uploaded Files</button>
                    <span id="historyMessage" class="field-message"></span>
                </div>
                <div class="history-password-change">
                    <h3>Change Lock Password</h3>
                    <input type="password" id="currentPwd" placeholder="current password" class="input-sm">
                    <input type="password" id="newPwd" placeholder="new password" class="input-sm">
                    <button id="changePwdBtn" class="btn-secondary">Set Password</button>
                    <span id="pwdMsg" class="field-message success"></span>
                </div>
            </section>
            <section class="history-list" id="historyList" style="margin-top:2rem;">
                <!-- history entries injected by JS -->
            </section>
        </main>
    </div>
    <script src="{{ url_for('static', filename='js/history.js') }}"></script>
</body>
</html>
